<div class="dashboard-content">
    <header class="content-header">
        <h2>Panel Médico</h2>
        <p>Gestión de sus consultas y pacientes</p>
    </header>

    <div class="stats-grid">
        <div class="stat-card emerald">
            <div class="icon-box"><i class="fas fa-calendar-alt"></i></div>
            <div class="stat-info">
                <span class="value">8</span>
                <span class="label">Citas para hoy</span>
            </div>
        </div>
        <div class="stat-card sky">
            <div class="icon-box"><i class="fas fa-user-injured"></i></div>
            <div class="stat-info">
                <span class="value">120</span>
                <span class="label">Mis Pacientes</span>
            </div>
        </div>
        <div class="stat-card amber">
            <div class="icon-box"><i class="fas fa-star"></i></div>
            <div class="stat-info">
                <span class="value">4.9</span>
                <span class="label">Calificación</span>
            </div>
        </div>
    </div>

    <div class="agenda-section">
        <div class="section-header">
            <h3>Próximas Citas</h3>
            <button class="btn-text">Ver todas <i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="appointment-list">
            <div class="appointment-card">
                <div class="time-box">
                    <span class="time">09:00</span>
                    <span class="period">AM</span>
                </div>
                <div class="patient-profile">
                    <div class="avatar-sm">JP</div>
                    <div class="info">
                        <span class="name">Juan Pérez</span>
                        <span class="reason">Control General</span>
                    </div>
                </div>
                <div class="status-badge">Confirmado</div>
                <button class="btn-action">Atender</button>
            </div>

            <div class="appointment-card">
                <div class="time-box">
                    <span class="time">10:30</span>
                    <span class="period">AM</span>
                </div>
                <div class="patient-profile">
                    <div class="avatar-sm">MG</div>
                    <div class="info">
                        <span class="name">María García</span>
                        <span class="reason">Revisión de Análisis</span>
                    </div>
                </div>
                <div class="status-badge">Confirmado</div>
                <button class="btn-action">Atender</button>
            </div>
        </div>
    </div>
</div>
