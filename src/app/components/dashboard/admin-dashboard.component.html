<div class="dashboard-content">
    <header class="content-header">
        <h2>Panel de Administración</h2>
        <p>Visión global del sistema médico</p>
    </header>

    <div class="stats-grid">
        <div class="stat-card blue">
            <div class="icon-box"><i class="fas fa-users"></i></div>
            <div class="stat-info">
                <span class="value">124</span>
                <span class="label">Usuarios Totales</span>
            </div>
        </div>
        <div class="stat-card green">
            <div class="icon-box"><i class="fas fa-user-md"></i></div>
            <div class="stat-info">
                <span class="value">45</span>
                <span class="label">Médicos Activos</span>
            </div>
        </div>
        <div class="stat-card purple">
            <div class="icon-box"><i class="fas fa-calendar-check"></i></div>
            <div class="stat-info">
                <span class="value">892</span>
                <span class="label">Citas del Mes</span>
            </div>
        </div>
    </div>

    <div class="recent-activity">
        <h3>Actividad Reciente</h3>
        <div class="activity-list">
            <div class="activity-item">
                <div class="icon-circle blue-icon"><i class="fas fa-user-plus"></i></div>
                <div class="info">
                    <span class="text">Nuevo médico registrado: <strong>Dr. Carlos Ruiz</strong></span>
                    <span class="time">Hace 2 horas</span>
                </div>
            </div>
            <div class="activity-item">
                <div class="icon-circle green-icon"><i class="fas fa-check"></i></div>
                <div class="info">
                    <span class="text">Sistema actualizado a la versión <strong>2.1.0</strong></span>
                    <span class="time">Hace 5 horas</span>
                </div>
            </div>
        </div>
    </div>
</div>
