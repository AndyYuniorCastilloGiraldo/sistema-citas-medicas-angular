<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-container">
                <i class="fas fa-stethoscope"></i>
            </div>
            <h1>Bienvenido</h1>
            <p>Inicie sesión en el sistema de citas médicas</p>
        </div>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" [(ngModel)]="loginData.email" required
                        placeholder="ejemplo@correo.com" #email="ngModel"
                        [class.invalid]="email.touched && email.invalid">
                </div>
            </div>


            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" [(ngModel)]="loginData.password" required
                        placeholder="Ingrese su contraseña" #password="ngModel"
                        [class.invalid]="password.touched && password.invalid">
                </div>
            </div>

            <div *ngIf="errorMessage" class="error-alert">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ errorMessage }}</span>
            </div>

            <button type="submit" [disabled]="loginForm.invalid || isLoading" class="btn-primary">
                <span *ngIf="!isLoading">Ingresar</span>
                <span *ngIf="isLoading" class="loader"></span>
            </button>

            <div class="auth-footer">
                <span>¿No tienes una cuenta?</span>
                <a routerLink="/register">Regístrate aquí</a>
            </div>
        </form>
    </div>
</div>
