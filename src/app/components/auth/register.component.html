<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-container">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Crear Cuenta</h1>
            <p>Regístrese para acceder al sistema de citas</p>
        </div>

        <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="auth-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" [(ngModel)]="registerData.username" required
                        minlength="4" placeholder="Mínimo 4 caracteres" #username="ngModel"
                        [class.invalid]="username.touched && username.invalid">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" [(ngModel)]="registerData.password" required
                        minlength="6" placeholder="Mínimo 6 caracteres" #password="ngModel"
                        [class.invalid]="password.touched && password.invalid">
                </div>
            </div>

            <div class="form-group">
                <label for="role">Tipo de Usuario</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-tag"></i>
                    <select id="role" name="role" [(ngModel)]="registerData.rolId" required class="custom-select">
                        <option [value]="2">Usuario General</option>
                    </select>
                </div>
            </div>

            <div *ngIf="successMessage" class="success-alert">
                <i class="fas fa-check-circle"></i>
                <span>{{ successMessage }}</span>
            </div>

            <div *ngIf="errorMessage" class="error-alert">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ errorMessage }}</span>
            </div>

            <button type="submit" [disabled]="registerForm.invalid || isLoading" class="btn-primary">
                <span *ngIf="!isLoading">Registrarse</span>
                <span *ngIf="isLoading" class="loader"></span>
            </button>

            <div class="auth-footer">
                <span>¿Ya tienes una cuenta?</span>
                <a routerLink="/login">Inicia sesión</a>
            </div>
        </form>
    </div>
</div>
