<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-container">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Crear Cuenta</h1>
            <p>Regístrese para acceder al sistema de citas</p>
        </div>

        <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="auth-form" autocomplete="off">
            <!-- DATOS PERSONALES -->
            <div class="form-row">
                <div class="form-group">
                    <label for="nombres">Nombres</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="nombres" name="nombres" [(ngModel)]="pacienteData.nombres" required
                            placeholder="Sus nombres">
                    </div>
                </div>
                <div class="form-group">
                    <label for="apellidos">Apellidos</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="apellidos" name="apellidos" [(ngModel)]="pacienteData.apellidos" required
                            placeholder="Sus apellidos">
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="dni">DNI</label>
                    <div class="input-wrapper">
                        <i class="fas fa-fingerprint"></i>
                        <input type="text" id="dni" name="dni" [(ngModel)]="pacienteData.dni" required
                            placeholder="Documento de identidad">
                    </div>
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="text" id="telefono" name="telefono" [(ngModel)]="pacienteData.telefono" required
                            placeholder="Nro contacto">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="direccion">Dirección (Opcional)</label>
                <div class="input-wrapper">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" id="direccion" name="direccion" [(ngModel)]="pacienteData.direccion"
                        placeholder="Dirección de domicilio">
                </div>
            </div>

            <!-- CREDENCIALES -->
            <div class="form-group">
                <label for="email">Correo Electrónico (Será su Usuario)</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" [(ngModel)]="registerData.email" required
                        placeholder="ejemplo@correo.com" #email="ngModel"
                        [class.invalid]="email.touched && email.invalid">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" [(ngModel)]="registerData.password" required
                        minlength="6" placeholder="Mínimo 6 caracteres" #password="ngModel"
                        [class.invalid]="password.touched && password.invalid" autocomplete="new-password">
                </div>
            </div>

            <div *ngIf="successMessage" class="success-alert">
                <i class="fas fa-check-circle"></i>
                <span>{{ successMessage }}</span>
            </div>

            <div *ngIf="errorMessage" class="error-alert">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ errorMessage }}</span>
            </div>

            <button type="submit" [disabled]="registerForm.invalid || isLoading" class="btn-primary">
                <span *ngIf="!isLoading">Registrarse</span>
                <span *ngIf="isLoading" class="loader"></span>
            </button>

            <div class="auth-footer">
                <span>¿Ya tienes una cuenta?</span>
                <a routerLink="/login">Inicia sesión</a>
            </div>
        </form>
    </div>
</div>
